repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--line-length=120]
        files: ^(engine|data|shared|screens|tests|save_system|pygame_game)/
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: [--max-line-length=120]
        files: ^(engine|data|shared|screens|tests|save_system|pygame_game)/
