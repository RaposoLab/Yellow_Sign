# ──────────────────────────────────────────────────────────────
# CI Pipeline — The King in Yellow
# Runs on every push and pull request to main.
# Steps: lint → unit tests → coverage report.
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────
  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install black flake8

      - name: Run black --check
        run: black --check --line-length=120 engine/ data/ shared/ screens/ tests/ save_system.py pygame_game.py

      - name: Run flake8
        run: flake8 --max-line-length=120 engine/ data/ shared/ screens/ tests/ save_system.py pygame_game.py

  # ── Job 2: Test ──────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pygame
          pip install hypothesis pytest-cov

      - name: Run tests with coverage
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          coverage run tests/run_all.py
          coverage xml -o coverage.xml

      - name: Print coverage summary
        run: coverage report -m --skip-covered

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ── Job 3: Coverage Report (PR only) ────────────────────
  coverage-report:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pygame hypothesis pytest-cov coverage
          pip install coverage[toml]

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Generate coverage comment
        run: |
          COVERAGE_TOTAL=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          print(root.attrib.get('line-rate', '0'))
          ")
          PERCENT=$(python -c "print(f'{float(\"${COVERAGE_TOTAL}\") * 100:.1f}')")

          cat > coverage_comment.md << EOF
          ## Coverage Report

          **Total Line Coverage: ${PERCENT}%**

          | Metric | Value |
          |--------|-------|
          | Lines covered | ${PERCENT}% |

          > Generated automatically by the CI pipeline.
          EOF

      - name: Post coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage_comment.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
